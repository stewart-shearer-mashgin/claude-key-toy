name: Run AI review gate (toy)
description: >-
  Toy of mashgin/ci's run-ai-review-gate. Same input surface; instead of a
  `docker run` of the real review image + Claude, it stubs the review with an
  echo and keeps the real exit-code-2 (SKIP) -> success mapping.
inputs:
  review-image:
    description: (unused in toy) real gate pulls this image
    required: false
    default: ""
  review-stage:
    description: architecture | product | test-legitimacy | security
    required: true
  git-user:
    required: false
    default: ""
  mr-number:
    description: PR number
    required: true
  repo-url:
    required: false
    default: ""
  ai-skills-branch:
    required: false
    default: main
  claude-model:
    required: false
    default: claude-sonnet-4-6
  app-url:
    required: false
    default: ""
  github-repository:
    required: true
  github-token:
    required: true
  ghcr-login-token:
    required: false
    default: ""
  claude-code-oauth-token:
    description: Claude OAuth token (shared, like current mashgin/ci)
    required: false
    default: ""
  mash1-token:
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run review container (STUBBED)
      shell: bash
      env:
        REVIEW_STAGE: ${{ inputs.review-stage }}
        MR_NUMBER: ${{ inputs.mr-number }}
        CLAUDE_MODEL: ${{ inputs.claude-model }}
        GITHUB_REPOSITORY: ${{ inputs.github-repository }}
        CLAUDE_OAUTH_INPUT: ${{ inputs.claude-code-oauth-token }}
        APP_URL: ${{ inputs.app-url }}
      run: |
        set -euo pipefail
        # Real gate hard-fails on an empty token; keep that behaviour.
        if [ -z "${CLAUDE_OAUTH_INPUT:-}" ]; then
          echo "ERROR: Set claude-code-oauth-token."; exit 1
        fi
        # Fingerprint the token without printing it (mirrors mash_print_secret_fingerprint).
        FP="$(printf '%s' "$CLAUDE_OAUTH_INPUT" | sha256sum | cut -c1-12)"

        echo "=== AI review gate: stage='${REVIEW_STAGE}' PR#${MR_NUMBER} repo=${GITHUB_REPOSITORY} ==="
        echo "  Model:  ${CLAUDE_MODEL}"
        echo "  Auth:   CLAUDE_CODE_OAUTH_TOKEN (sha256_prefix=${FP})"
        [ "${REVIEW_STAGE}" = "product" ] && echo "  App URL: ${APP_URL:-<none>}"

        # ---- where the real gate does: docker run ... ghcr.io/.../review ----
        # ---- which runs: claude -p "Run /mash-review-${REVIEW_STAGE} PR" ----
        echo "  [stub] pretending to run /mash-review-${REVIEW_STAGE} ${MR_NUMBER}..."
        rc=0   # a real review sets rc; 0=pass, 1=blocking findings, 2=skip

        # keep the real SKIP mapping so parity is exact
        if [ "$rc" -eq 2 ]; then
          echo "Review gate reported SKIP (exit 2); treating as success."; exit 0
        fi
        echo "  [stub] stage '${REVIEW_STAGE}' PASSED (0 blocking findings)"
        exit "$rc"
