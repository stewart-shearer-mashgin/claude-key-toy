name: AI Review (toy)
on:
  workflow_call:
    inputs:
      claude-model:
        required: false
        type: string
        default: "claude-sonnet-4-6"
      enable-architecture:
        required: false
        type: boolean
        default: true
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
permissions:
  contents: read
  pull-requests: write
jobs:
  ai-review-architecture:
    name: AI Review Architecture
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-architecture }}
    steps:
      - name: Run gate (inline)
        run: echo "inline gate: architecture PR#${{ github.event.pull_request.number }}"
