name: AI Review (toy)
on:
  workflow_call:
    inputs:
      claude-model: {required: false, type: string, default: "claude-sonnet-4-6"}
jobs:
  ai-review-architecture:
    runs-on: ubuntu-latest
    steps:
      - run: echo "gate PR#${{ github.event.pull_request.number }} model=${{ inputs.claude-model }}"
