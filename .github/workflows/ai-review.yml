name: AI Review (toy)
on:
  workflow_call:
    inputs:
      claude-model: {required: false, type: string, default: "claude-sonnet-4-6"}
      app-url: {required: false, type: string, default: ""}
      skip-label: {required: false, type: string, default: "skip-ai-review"}
      enable-architecture: {required: false, type: boolean, default: true}
      enable-product: {required: false, type: boolean, default: false}
      enable-tests: {required: false, type: boolean, default: false}
      enable-security: {required: false, type: boolean, default: false}
      manual-trigger: {required: false, type: string, default: "true"}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: {required: false}
permissions:
  contents: read
  pull-requests: write
jobs:
  ai-review-architecture:
    name: AI Review Architecture
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-architecture }}
    steps:
      - name: gate
        run: echo "architecture gate PR#${{ github.event.pull_request.number }} model=${{ inputs.claude-model }}"
