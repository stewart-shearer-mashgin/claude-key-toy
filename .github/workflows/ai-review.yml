name: AI Review (toy)
on:
  workflow_call:
    inputs:
      claude-model:
        required: false
        type: string
        default: "claude-sonnet-4-6"
      enable-architecture:
        required: false
        type: boolean
        default: true
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
permissions:
  contents: read
  pull-requests: write
jobs:
  ai-review-architecture:
    name: AI Review Architecture
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-architecture }}
    steps:
      - name: Run gate
        uses: stewart-shearer-mashgin/claude-key-toy/github/actions/run-ai-review-gate@main
        with:
          review-stage: architecture
          mr-number: ${{ github.event.pull_request.number }}
          claude-model: ${{ inputs.claude-model }}
          github-repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
